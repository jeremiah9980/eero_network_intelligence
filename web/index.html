<!doctype html><html><head><meta charset=utf-8><title>eero Network Intelligence</title><style>body{font-family:system-ui;background:#0b0f14;color:#e8eef5;margin:25px}.card{background:#151b23;border:1px solid #263241;border-radius:16px;padding:16px;margin:12px 0}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #263241}.pill{border-radius:999px;background:#193b66;padding:4px 9px}</style></head><body><h1>eero Network Intelligence</h1><button onclick=refresh()>Refresh</button> <button onclick=poll()>Poll Now</button><div id=status class=card>Loading…</div><h2>Devices</h2><div class=card><table id=devices></table></div><h2>Presence Events</h2><div class=card><table id=events></table></div><script>
async function j(u,o){return (await fetch(u,o)).json()} async function poll(){await j('/api/poll',{method:'POST'});refresh()} async function refresh(){let d=await j('/api/devices'),e=await j('/api/events');status.innerHTML=`<span class=pill>${d.length} known devices</span> <span class=pill>${e.length} recent events</span>`;devices.innerHTML='<tr><th>Name</th><th>MAC</th><th>Vendor</th><th>Profile</th><th>Last Seen</th></tr>'+d.map(x=>`<tr><td>${x.name||''}</td><td>${x.mac||''}</td><td>${x.vendor||''}</td><td>${x.profile||''}</td><td>${x.last_seen||''}</td></tr>`).join('');events.innerHTML='<tr><th>Time</th><th>Event</th><th>Name</th><th>MAC</th><th>IP</th></tr>'+e.map(x=>`<tr><td>${new Date(x.ts*1000).toLocaleString()}</td><td>${x.event}</td><td>${x.name||''}</td><td>${x.mac||''}</td><td>${x.ip||''}</td></tr>`).join('')}refresh();let ws=new WebSocket((location.protocol=='https:'?'wss://':'ws://')+location.host+'/ws');ws.onmessage=()=>refresh();</script></body></html>
