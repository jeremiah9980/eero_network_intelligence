services:
  eero-intel:
    build: .
    ports: ["8080:8080"]
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    command: python -m app.main --config config/config.yaml --run
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on: [eero-intel]
